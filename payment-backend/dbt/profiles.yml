payment_system:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: 5432
      dbname: payment_db
      user: payment
      password: "{{ env_var('POSTGRES_PASSWORD', 'payment') }}"
      schema: dbt_dev
      threads: 4
    prod:
      type: bigquery
      method: oauth
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      dataset: payment_analytics
      threads: 4
      timeout_seconds: 300
      # TODO: Phase 11 — set GCP_PROJECT_ID and configure service account
      # method: service-account with keyfile for CI/CD
