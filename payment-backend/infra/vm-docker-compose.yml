# VM subset of docker-compose.yml for Compute Engine VM (Plan 11-02)
# Includes: Zookeeper, Kafka, kafka-init, Spark, validation-consumer, scoring-consumer, ledger-consumer
# Does NOT include: redis, postgres, prometheus, grafana, webhook-service, ml-scoring-service,
#                   streamlit-dashboard, airflow-* (those run on Cloud Run or managed services)
#
# Usage:
#   export VM_INTERNAL_IP=<vm-internal-ip>
#   export CLOUD_SQL_HOST=172.31.0.3
#   export REDIS_HOST=10.101.168.91
#   export GCS_BUCKET_NAME=payment-spark-checkpoints-1775139408
#   docker-compose -f vm-docker-compose.yml up -d
#
# Images are pulled from Artifact Registry (built and pushed in Plan 11-02).
# No .env file on VM — all secrets come from shell environment variables.

services:
  # ─── Zookeeper (required by Kafka) ───────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "cub zk-ready localhost:2181 30"]
      interval: 10s
      timeout: 35s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ─── Kafka ────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://${VM_INTERNAL_IP:-localhost}:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  # ─── Kafka topic initialiser (runs once, then exits) ─────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic payment.webhook.received      --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic payment.transaction.validated --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic payment.transaction.scored    --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic payment.ledger.entry          --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic payment.reconciliation.queue  --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic payment.alert.triggered       --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic payment.dlq                   --partitions 3 --replication-factor 1
        echo "All topics created."
    restart: "no"

  # --- Spark feature engine (reads payment.transaction.validated, writes features to Redis) ---
  spark-feature-engine:
    image: asia-south1-docker.pkg.dev/project-2f9d2775-493e-4e59-9b8/payment-system/spark-feature-engine:latest
    container_name: spark-feature-engine
    ports:
      - "4040:4040"
    environment:
      - SPARK_CHECKPOINT_DIR=gs://${GCS_BUCKET_NAME}/checkpoints
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_URL=redis://${REDIS_HOST}:6379/0
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ─── Validation consumer (reads payment.webhook.received, validates, DLQ) ────
  validation-consumer:
    image: asia-south1-docker.pkg.dev/project-2f9d2775-493e-4e59-9b8/payment-system/validation-consumer:latest
    container_name: validation-consumer
    ports:
      - "8002:8002"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - DATABASE_URL_SYNC=postgresql://payment:payment@${CLOUD_SQL_HOST}:5432/payment_db
      - REDIS_URL=redis://${REDIS_HOST}:6379/0
      - DEFAULT_MERCHANT_ID=test_merchant
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # --- Scoring consumer (reads payment.transaction.validated, scores via XGBoost) ---
  scoring-consumer:
    image: asia-south1-docker.pkg.dev/project-2f9d2775-493e-4e59-9b8/payment-system/scoring-consumer:latest
    container_name: scoring-consumer
    ports:
      - "8003:8003"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_URL=redis://${REDIS_HOST}:6379/0
      - DATABASE_URL_SYNC=postgresql://payment:payment@${CLOUD_SQL_HOST}:5432/payment_db
      - ML_MODEL_PATH=ml/models/model.ubj
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # --- Ledger consumer (reads payment.ledger.entry, writes DEBIT+CREDIT, SETTLED state) ---
  ledger-consumer:
    image: asia-south1-docker.pkg.dev/project-2f9d2775-493e-4e59-9b8/payment-system/ledger-consumer:latest
    container_name: ledger-consumer
    ports:
      - "8004:8004"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - DATABASE_URL_SYNC=postgresql://payment:payment@${CLOUD_SQL_HOST}:5432/payment_db
      - REDIS_URL=redis://${REDIS_HOST}:6379/0
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
