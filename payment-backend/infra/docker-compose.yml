services:
  # ─── Zookeeper (required by Kafka) ───────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "cub zk-ready localhost:2181 30"]
      interval: 10s
      timeout: 35s
      retries: 5
      start_period: 20s

  # ─── Kafka ────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─── Kafka topic initialiser (runs once, then exits) ─────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic payment.webhook.received      --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic payment.transaction.validated --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic payment.transaction.scored    --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic payment.ledger.entry          --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic payment.reconciliation.queue  --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic payment.alert.triggered       --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic payment.dlq                   --partitions 3 --replication-factor 1
        echo "All topics created."
    restart: "no"

  # ─── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-payment}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-payment}
      POSTGRES_DB: ${POSTGRES_DB:-payment_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-payment}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - webhook-service
      - ml-scoring-service

  # ─── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  # ─── FastAPI webhook service ──────────────────────────────────────────────────
  webhook-service:
    build:
      context: ..
      dockerfile: infra/Dockerfile.webhook
    container_name: webhook-service
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Validation consumer (reads payment.webhook.received, validates, DLQ) ───
  validation-consumer:
    build:
      context: ..
      dockerfile: infra/Dockerfile.validation
    container_name: validation-consumer
    ports:
      - "8002:8002"
    env_file:
      - ../.env
    environment:
      - DATABASE_URL_SYNC=postgresql://payment:payment@postgres:5432/payment_db
      - REDIS_URL=redis://redis:6379/0
      - DEFAULT_MERCHANT_ID=test_merchant
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # --- Spark feature engine (reads payment.transaction.validated, writes features to Redis) ---
  spark-feature-engine:
    build:
      context: ..
      dockerfile: spark/Dockerfile
    container_name: spark-feature-engine
    ports:
      - "4040:4040"
    environment:
      - SPARK_CHECKPOINT_DIR=/tmp/spark-checkpoints
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - spark_checkpoints:/tmp/spark-checkpoints
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # --- Scoring consumer (reads payment.transaction.validated, scores via XGBoost, publishes scored events) ---
  scoring-consumer:
    build:
      context: ..
      dockerfile: infra/Dockerfile.scoring-consumer
    container_name: scoring-consumer
    ports:
      - "8003:8003"
    env_file:
      - ../.env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL_SYNC=postgresql://payment:payment@postgres:5432/payment_db
      - ML_MODEL_PATH=ml/models/model.ubj
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # --- ML scoring FastAPI service (POST /score debug/test endpoint) ---
  ml-scoring-service:
    build:
      context: ..
      dockerfile: infra/Dockerfile.ml-service
    container_name: ml-scoring-service
    ports:
      - "8001:8001"
    env_file:
      - ../.env
    environment:
      - ML_MODEL_PATH=ml/models/model.ubj
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- Ledger consumer (reads payment.ledger.entry, writes DEBIT+CREDIT, transitions to SETTLED) ---
  ledger-consumer:
    build:
      context: ..
      dockerfile: infra/Dockerfile.ledger-consumer
    container_name: ledger-consumer
    ports:
      - "8004:8004"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - DATABASE_URL_SYNC=postgresql://payment:payment@postgres:5432/payment_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ─── Airflow init (runs once: db migrate + create admin user) ────────────────
  airflow-init:
    build:
      context: ..
      dockerfile: airflow/Dockerfile
    container_name: airflow-init
    entrypoint: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true
      "
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://payment:payment@postgres:5432/payment_db
      - AIRFLOW__CORE__FERNET_KEY=ZmRlZjEyMzQ1Njc4OTBhYmNkZWYxMjM0NTY3ODkwYWI=
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - PYTHONPATH=/opt/airflow
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ─── Airflow webserver (UI on port 8080) ─────────────────────────────────────
  airflow-webserver:
    build:
      context: ..
      dockerfile: airflow/Dockerfile
    container_name: airflow-webserver
    command: airflow webserver --port 8080
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://payment:payment@postgres:5432/payment_db
      - AIRFLOW__CORE__FERNET_KEY=ZmRlZjEyMzQ1Njc4OTBhYmNkZWYxMjM0NTY3ODkwYWI=
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - PYTHONPATH=/opt/airflow
      - DATABASE_URL_SYNC=postgresql://payment:payment@postgres:5432/payment_db
      - STRIPE_API_KEY=${STRIPE_API_KEY:-sk_test_placeholder}
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ─── Airflow scheduler ────────────────────────────────────────────────────────
  airflow-scheduler:
    build:
      context: ..
      dockerfile: airflow/Dockerfile
    container_name: airflow-scheduler
    command: airflow scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://payment:payment@postgres:5432/payment_db
      - AIRFLOW__CORE__FERNET_KEY=ZmRlZjEyMzQ1Njc4OTBhYmNkZWYxMjM0NTY3ODkwYWI=
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - PYTHONPATH=/opt/airflow
      - DATABASE_URL_SYNC=postgresql://payment:payment@postgres:5432/payment_db
      - STRIPE_API_KEY=${STRIPE_API_KEY:-sk_test_placeholder}
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ─── Streamlit observability dashboard (port 8501) ────────────────────────────
  streamlit-dashboard:
    build:
      context: ..
      dockerfile: dashboard/Dockerfile
    container_name: streamlit-dashboard
    ports:
      - "8501:8501"
    environment:
      - DATABASE_URL=postgresql://payment:payment@postgres:5432/payment_db
    depends_on:
      postgres:
        condition: service_healthy
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0 --server.runOnSave true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  grafana_data:
  spark_checkpoints:
