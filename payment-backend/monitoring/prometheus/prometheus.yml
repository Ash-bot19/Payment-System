global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "webhook-service"
    static_configs:
      - targets: ["webhook-service:8000"]
    metrics_path: /metrics

  - job_name: "ml-scoring-service"
    static_configs:
      - targets: ["ml-scoring-service:8001"]
    metrics_path: /metrics
